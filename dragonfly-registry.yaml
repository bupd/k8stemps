apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dragonfly-registry-data
  namespace: dragonfly
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dragonfly-registry
  namespace: dragonfly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dragonfly-registry
  template:
    metadata:
      labels:
        app: dragonfly-registry
    spec:
      containers:
        - name: registry
          image: registry:3
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
          livenessProbe:
            httpGet:
              path: /v2/
              port: 5000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dragonfly-registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: dragonfly-registry
  namespace: dragonfly
spec:
  type: NodePort
  selector:
    app: dragonfly-registry
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 32000
