apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postiz
  namespace: postiz
spec:
  interval: 30m
  chart:
    spec:
      chart: postiz-app
      version: 1.0.5
      sourceRef:
        kind: HelmRepository
        name: postiz
        namespace: postiz
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: postiz-postiz-app
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/command
                value:
                  - /bin/sh
                  - -lc
              - op: add
                path: /spec/template/spec/containers/0/args
                value:
                  - |
                    set -e
                    sed -i 's/&prompt=none//g; s/prompt=none&//g' /app/apps/backend/dist/libraries/nestjs-libraries/src/integrations/social/linkedin.provider.js /app/apps/backend/dist/libraries/nestjs-libraries/src/integrations/social/linkedin.page.provider.js
                    node <<'NODE'
                    const fs = require('fs');
                    const paths = [
                      '/app/apps/backend/dist/libraries/nestjs-libraries/src/integrations/social/x.provider.js',
                      '/app/apps/workers/dist/libraries/nestjs-libraries/src/integrations/social/x.provider.js',
                    ];

                    function replaceMethod(source, signature, replacement) {
                      const start = source.indexOf(signature);
                      if (start === -1) {
                        throw new Error(`Could not find ${signature}`);
                      }
                      const braceStart = source.indexOf('{', start);
                      let depth = 0;
                      for (let i = braceStart; i < source.length; i++) {
                        const char = source[i];
                        if (char === '{') depth++;
                        if (char === '}') depth--;
                        if (depth === 0) {
                          return source.slice(0, start) + replacement + source.slice(i + 1);
                        }
                      }
                      throw new Error(`Could not replace ${signature}`);
                    }

                    for (const path of paths) {
                      let source = fs.readFileSync(path, 'utf8');
                      source = replaceMethod(source, 'async post(id, accessToken, postDetails)', `async post(id, accessToken, postDetails) {
                            const bridgeUrl = process.env.X_BRIDGE_URL || 'http://postiz-x-cookie-bridge.postiz.svc.cluster.local/post';
                            const headers = { 'content-type': 'application/json' };
                            if (process.env.X_BRIDGE_TOKEN) {
                                headers.authorization = 'Bearer ' + process.env.X_BRIDGE_TOKEN;
                            }
                            const response = await fetch(bridgeUrl, {
                                method: 'POST',
                                headers,
                                body: JSON.stringify({
                                    posts: postDetails.map((post) => ({
                                        id: post.id,
                                        message: post.message,
                                        media: (post.media || []).map((media) => ({
                                            path: media.path,
                                            alt: media.alt || media.altText || '',
                                        })),
                                    })),
                                }),
                            });
                            const body = await response.text();
                            if (!response.ok) {
                                throw new Error('X bridge failed: ' + body);
                            }
                            const data = JSON.parse(body);
                            return (data.results || []).map((result, index) => ({
                                id: result.id || postDetails[index]?.id,
                                postId: result.postId || 'posted',
                                releaseURL: result.releaseURL || 'https://x.com',
                                status: result.status || 'posted',
                            }));
                        }`);

                      fs.writeFileSync(path, source);
                    }

                    const authControllerPath = '/app/apps/backend/dist/apps/backend/src/api/routes/auth.controller.js';
                    let authController = fs.readFileSync(authControllerPath, 'utf8');
                    authController = replaceMethod(authController, 'async canRegister()', `async canRegister() {
                            return { register: false };
                        }`);
                    authController = replaceMethod(authController, 'async register(req, body, response, ip, userAgent)', `async register(req, body, response, ip, userAgent) {
                            return response.status(403).send('Registration is disabled');
                        }`);
                    authController = replaceMethod(authController, 'async login(req, body, response, ip, userAgent)', `async login(req, body, response, ip, userAgent) {
                            if (String(body?.provider || '').toUpperCase() === 'GOOGLE') {
                                return response.status(403).send('Google login is disabled');
                            }
                            try {
                                const getOrgFromCookie = this._authService.getOrgFromCookie(req?.cookies?.org);
                                const { jwt, addedOrg } = await this._authService.routeAuth(body.provider, body, ip, userAgent, getOrgFromCookie);
                                response.cookie('auth', jwt, {
                                    domain: (0, subdomain_management_1.getCookieUrlFromDomain)(process.env.FRONTEND_URL),
                                    ...(!process.env.NOT_SECURED
                                        ? {
                                            secure: true,
                                            httpOnly: true,
                                            sameSite: 'none',
                                        }
                                        : {}),
                                    expires: new Date(Date.now() + 1000 * 60 * 60 * 24 * 365),
                                });
                                if (process.env.NOT_SECURED) {
                                    response.header('auth', jwt);
                                }
                                if (typeof addedOrg !== 'boolean' && addedOrg?.organizationId) {
                                    response.cookie('showorg', addedOrg.organizationId, {
                                        domain: (0, subdomain_management_1.getCookieUrlFromDomain)(process.env.FRONTEND_URL),
                                        ...(!process.env.NOT_SECURED
                                            ? {
                                                secure: true,
                                                httpOnly: true,
                                                sameSite: 'none',
                                            }
                                            : {}),
                                        expires: new Date(Date.now() + 1000 * 60 * 60 * 24 * 365),
                                    });
                                    if (process.env.NOT_SECURED) {
                                        response.header('showorg', addedOrg.organizationId);
                                    }
                                }
                                response.header('reload', 'true');
                                response.status(200).json({
                                    login: true,
                                });
                            }
                            catch (e) {
                                response.status(400).send(e.message);
                            }
                        }`);
                    authController = replaceMethod(authController, 'oauthLink(provider, query)', `oauthLink(provider, query) {
                            if (String(provider || '').toUpperCase() === 'GOOGLE') {
                                throw new common_1.ForbiddenException('Google login is disabled');
                            }
                            return this._authService.oauthLink(provider, query);
                        }`);
                    authController = replaceMethod(authController, 'async oauthExists(code, provider, response)', `async oauthExists(code, provider, response) {
                            if (String(provider || '').toUpperCase() === 'GOOGLE') {
                                return response.status(403).send('Google login is disabled');
                            }
                            const { jwt, token } = await this._authService.checkExists(provider, code);
                            if (token) {
                                return response.json({ token });
                            }
                            response.cookie('auth', jwt, {
                                domain: (0, subdomain_management_1.getCookieUrlFromDomain)(process.env.FRONTEND_URL),
                                ...(!process.env.NOT_SECURED
                                    ? {
                                        secure: true,
                                        httpOnly: true,
                                        sameSite: 'none',
                                    }
                                    : {}),
                                expires: new Date(Date.now() + 1000 * 60 * 60 * 24 * 365),
                            });
                            if (process.env.NOT_SECURED) {
                                response.header('auth', jwt);
                            }
                            response.header('reload', 'true');
                            response.status(200).json({
                                login: true,
                            });
                        }`);
                    fs.writeFileSync(authControllerPath, authController);
                    NODE
                    nginx
                    exec pnpm run pm2
  valuesFrom:
    - kind: Secret
      name: postiz-helm-values
      valuesKey: values.yaml
  values:
    image:
      repository: ghcr.io/gitroomhq/postiz-app
      tag: v2.11.2
      pullPolicy: IfNotPresent
    podAnnotations:
      postiz.bupd.xyz/restarted-at: "2026-06-30T10:30:11Z"
    replicaCount: 1
    service:
      type: ClusterIP
      port: 80
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http01
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      hosts:
        - host: postiz.bupd.xyz
          paths:
            - path: /
              pathType: Prefix
              port: 80
      tls:
        - secretName: postiz-tls
          hosts:
            - postiz.bupd.xyz
    postgresql:
      enabled: false
    redis:
      enabled: false
    env:
      MAIN_URL: "https://postiz.bupd.xyz"
      FRONTEND_URL: "https://postiz.bupd.xyz"
      NEXT_PUBLIC_BACKEND_URL: "https://postiz.bupd.xyz/api"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "true"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_STATIC_DIRECTORY: "/uploads"
      NX_ADD_PLUGINS: "false"
      API_LIMIT: "30"
      MASTODON_URL: "https://mas.to"
      DISABLE_X_ANALYTICS: "true"
      X_BRIDGE_URL: "http://postiz-x-cookie-bridge.postiz.svc.cluster.local/post"
    extraVolumes:
      - name: uploads-volume
        persistentVolumeClaim:
          claimName: postiz-uploads
    extraVolumeMounts:
      - name: uploads-volume
        mountPath: /uploads
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 2Gi
