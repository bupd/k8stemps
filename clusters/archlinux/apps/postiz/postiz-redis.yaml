apiVersion: v1
kind: Service
metadata:
  name: postiz-redis-master
  namespace: postiz
  labels:
    app.kubernetes.io/name: postiz-redis
    app.kubernetes.io/instance: postiz
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: postiz-redis
    app.kubernetes.io/instance: postiz
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postiz-redis-master
  namespace: postiz
  labels:
    app.kubernetes.io/name: postiz-redis
    app.kubernetes.io/instance: postiz
spec:
  serviceName: postiz-redis-master
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postiz-redis
      app.kubernetes.io/instance: postiz
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postiz-redis
        app.kubernetes.io/instance: postiz
    spec:
      containers:
        - name: redis
          image: redis:7.2
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --appendonly
            - "yes"
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
